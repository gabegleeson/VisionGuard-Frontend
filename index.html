<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VisionGuard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
    .chart-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
    }
</style>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">VisionGuard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Views
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Locations</a></li>
                            <li><a class="dropdown-item" href="#">Areas</a></li>
                            <li><a class="dropdown-item" href="#">Cameras</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Settings</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4"> <!-- g-4 adds spacing between cards -->

            <div class="container py-5">
                <div class="row g-4">

                    <!-- Camera Status card -->
                    <div class="col-md-4">
                        <div class="card shadow h-100">
                            <div class="card-header">Camera Status</div>
                            <div class="card-body">
                                <div class="chart-container" style="position: relative; width: 100%; height: 300px;">
                                    <canvas id="cameraChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- System Health card -->
                    <div class="col-md-4">
                        <div class="card shadow h-100">
                            <div class="card-header">System Health</div>
                            <div class="card-body text-center">
                                <div class="chart-container" style="position: relative; width: 100%; height: 300px;">
                                    <h4 id="healthText" class="mb-3"></h4>
                                    <canvas id="healthChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Camera Types card -->
                    <div class="col-md-4">
                        <div class="card shadow h-100">
                            <div class="card-header">Camera Types</div>
                            <div class="card-body text-center">
                                <div class="chart-container" style="position: relative; width: 100%; height: 300px;">
                                    <canvas id="cameraTypesChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Alerts Over Time card -->
                <div class="row g-4 mt-4">
                    <div class="col-12">
                        <div class="card shadow">
                            <div class="card-header">Alerts Over Time</div>
                            <div class="card-body">
                                <div class="chart-container" style="position: relative; width: 100%; height: 500px;">
                                    <canvas id="alertsChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cameras by Area card -->
                <div class="row g-4 mt-4">
                    <div class="col-12">
                        <div class="card shadow">
                            <div class="card-header">Cameras by Area</div>
                            <div class="card-body">
                                <div class="chart-container" style="position: relative; width: 100%; height: 400px;">
                                    <canvas id="camerasAreaChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>


        </div>
    </div>



    <script>
        const ctx = document.getElementById('cameraChart').getContext('2d');
        const cameraChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Online', 'Offline'],
                datasets: [{
                    data: [75, 25], // Example values: 75 online, 25 offline
                    backgroundColor: ['#28a745', '#dc3545'], // green for online, red for offline
                }]
            },
            options: {
                maintainAspectRatio: false,
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    </script>

    <script>
        // Example values
        const online = 92; // %
        const offline = 100 - online;

        const ctx2 = document.getElementById('healthChart').getContext('2d');
        const healthChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Online', 'Offline'],
                datasets: [{
                    data: [online, offline],
                    backgroundColor: ['#28a745', '#e0e0e0'], // green vs gray
                    borderWidth: 0
                }]
            },
            options: {
                maintainAspectRatio: false,
                circumference: 180,       // make it a half circle
                rotation: -90,            // start at top
                cutout: '70%',            // hollow middle
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                }
            }
        });

        // Update the center text
        document.getElementById("healthText").innerText = online + "% Healthy";
    </script>

    <script>
        const ctx3 = document.getElementById('alertsChart').getContext('2d');
        const alertsChart = new Chart(ctx3, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], // Example days
                datasets: [
                    {
                        label: 'Motion Detected',
                        data: [12, 19, 15, 22, 18, 24, 30],
                        fill: true,
                        backgroundColor: 'rgba(54, 162, 235, 0.3)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        tension: 0.3,
                        stack: 'alerts'
                    },
                    {
                        label: 'Camera Offline',
                        data: [5, 7, 4, 6, 8, 10, 9],
                        fill: true,
                        backgroundColor: 'rgba(255, 99, 132, 0.3)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        tension: 0.3,
                        stack: 'alerts'
                    },
                    {
                        label: 'Quality Issues',
                        data: [3, 4, 6, 5, 7, 6, 8],
                        fill: true,
                        backgroundColor: 'rgba(255, 206, 86, 0.3)',
                        borderColor: 'rgba(255, 206, 86, 1)',
                        tension: 0.3,
                        stack: 'alerts'
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                },
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                scales: {
                    y: {
                        stacked: true,
                        title: {
                            display: true,
                            text: 'Number of Alerts'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Day'
                        }
                    }
                }
            }
        });
    </script>

    <script>
        const ctx4 = document.getElementById('camerasGroupChart').getContext('2d');
        const camerasGroupChart = new Chart(ctx4, {
            type: 'bar',
            data: {
                labels: ['Parks', 'Libraries', 'Streets', 'Stations', 'Offices'],
                datasets: [
                    {
                        label: 'Online',
                        data: [12, 8, 20, 15, 10], // Example online counts
                        backgroundColor: '#28a745',
                        stack: 'cameras'
                    },
                    {
                        label: 'Offline',
                        data: [2, 1, 5, 3, 2], // Example offline counts
                        backgroundColor: '#dc3545',
                        stack: 'cameras'
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                },
                scales: {
                    x: {
                        stacked: true,
                        title: {
                            display: true,
                            text: 'Groups'
                        }
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Number of Cameras'
                        }
                    }
                }
            }
        });
    </script>

    <script>
  const ctx6 = document.getElementById('cameraTypesChart').getContext('2d');
  const cameraTypesChart = new Chart(ctx6, {
    type: 'doughnut',
    data: {
      labels: ['Dome', 'Bullet', 'PTZ', 'Thermal', 'Other'],
      datasets: [{
        data: [15, 25, 10, 5, 3], // Example counts for each type
        backgroundColor: [
          '#007bff', // blue
          '#28a745', // green
          '#ffc107', // yellow
          '#dc3545', // red
          '#6c757d'  // gray
        ],
        borderColor: '#ffffff',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%', // donut shape
      plugins: {
        legend: {
          position: 'bottom'
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              let total = context.dataset.data.reduce((a,b) => a + b, 0);
              let value = context.raw;
              let percentage = ((value / total) * 100).toFixed(1);
              return context.label + ': ' + value + ' (' + percentage + '%)';
            }
          }
        }
      }
    }
  });
</script>

    <script>
        const ctx5 = document.getElementById('camerasAreaChart').getContext('2d');
        const camerasAreaChart = new Chart(ctx5, {
            type: 'bar',
            data: {
                labels: ['Main Building', 'Fountain', 'Library', 'Parking Lot', 'Reception'], // area names
                datasets: [
                    {
                        label: 'Online',
                        data: [10, 5, 8, 6, 4], // example online counts
                        backgroundColor: '#28a745',
                        stack: 'cameras'
                    },
                    {
                        label: 'Offline',
                        data: [1, 0, 2, 1, 0], // example offline counts
                        backgroundColor: '#dc3545',
                        stack: 'cameras'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                },
                scales: {
                    x: {
                        stacked: true,
                        title: {
                            display: true,
                            text: 'Area'
                        }
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Number of Cameras'
                        }
                    }
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
