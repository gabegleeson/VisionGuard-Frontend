{% extends "layout.html" %}
{% block title %}Dashboard - VisionGuard{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-12 col-lg-4">
    <div class="card shadow h-100">
      <div class="card-header">Camera Status</div>
      <div class="card-body">
        <div class="chart-container"><canvas id="cameraChart"></canvas></div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow h-100">
      <div class="card-header">System Health</div>
      <div class="card-body text-center">
        <h4 id="healthText" class="mb-3"></h4>
        <div class="chart-container"><canvas id="healthChart"></canvas></div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow h-100">
      <div class="card-header">Camera Types</div>
      <div class="card-body">
        <div class="chart-container"><canvas id="cameraTypesChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- Alerts Over Time -->
<div class="row g-4 mt-1">
  <div class="col-12">
    <div class="card shadow">
      <div class="card-header">Alerts Over Time</div>
      <div class="card-body">
        <div class="chart-container" style="height: 400px;"><canvas id="alertsChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- Cameras by Location -->
<div class="row g-4 mt-1">
  <div class="col-12">
    <div class="card shadow">
      <div class="card-header">Cameras by Location</div>
      <div class="card-body">
        <div class="chart-container" style="height: 350px;"><canvas id="camerasLocationChart"></canvas></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script id="dashboard-data" type="application/json">{{ dashboard_data | tojson }}</script>
<script>
    const dashboardData = JSON.parse(document.getElementById('dashboard-data').textContent);
    const palette = ['#007bff', '#28a745', '#ffc107', '#dc3545', '#17a2b8', '#fd7e14', '#6f42c1', '#6c757d'];
    const themeStyles = getComputedStyle(document.body);
    const chartTextColor = themeStyles.getPropertyValue('--vg-text').trim() || '#212529';
    const chartMutedColor = themeStyles.getPropertyValue('--vg-text-muted').trim() || '#6c757d';
    const chartGridColor = themeStyles.getPropertyValue('--vg-border-soft').trim() || 'rgba(0, 0, 0, 0.08)';

    function legendOptions(position = 'bottom') {
        return {
            position,
            labels: {
                color: chartTextColor,
                boxWidth: 12,
                boxHeight: 12,
                padding: 16
            }
        };
    }

    function axisOptions(titleText) {
        return {
            title: {
                display: true,
                text: titleText,
                color: chartMutedColor
            },
            ticks: {
                color: chartTextColor
            },
            grid: {
                color: chartGridColor
            }
        };
    }

    new Chart(document.getElementById('cameraChart').getContext('2d'), {
        type: 'pie',
        data: {
            labels: dashboardData.camera_status.labels,
            datasets: [{
                data: dashboardData.camera_status.values,
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            plugins: {
                legend: legendOptions()
            }
        }
    });

    new Chart(document.getElementById('healthChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: ['Online', 'Offline'],
            datasets: [{
                data: [dashboardData.system_health.online, dashboardData.system_health.offline],
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            circumference: 180,
            rotation: -90,
            cutout: '70%',
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
            }
        }
    });

    document.getElementById('healthText').innerText = dashboardData.system_health.total
        ? `${dashboardData.system_health.percentage}% Healthy`
        : 'No Cameras';

    new Chart(document.getElementById('alertsChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: dashboardData.alerts_over_time.labels,
            datasets: dashboardData.alerts_over_time.datasets.map((dataset, index) => ({
                label: dataset.label,
                data: dataset.data,
                fill: true,
                backgroundColor: `${palette[index % palette.length]}33`,
                borderColor: palette[index % palette.length],
                tension: 0.3,
                stack: 'alerts'
            }))
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            plugins: {
                legend: legendOptions()
            },
            interaction: {
                mode: 'index',
                intersect: false
            },
            scales: {
                y: {
                    stacked: true,
                    beginAtZero: true,
                    ...axisOptions('Number of Alerts')
                },
                x: {
                    ...axisOptions('Day')
                }
            }
        }
    });

    new Chart(document.getElementById('cameraTypesChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: dashboardData.camera_types.labels,
            datasets: [{
                data: dashboardData.camera_types.values,
                backgroundColor: dashboardData.camera_types.labels.map((_, index) => palette[index % palette.length]),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
                legend: legendOptions(),
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            const total = context.dataset.data.reduce((sum, value) => sum + value, 0);
                            const value = context.raw;
                            const percentage = total ? ((value / total) * 100).toFixed(1) : '0.0';
                            return `${context.label}: ${value} (${percentage}%)`;
                        }
                    }
                }
            }
        }
    });

    new Chart(document.getElementById('camerasLocationChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: dashboardData.cameras_by_location.labels,
            datasets: [
                {
                    label: 'Online',
                    data: dashboardData.cameras_by_location.online,
                    backgroundColor: '#28a745',
                    stack: 'cameras'
                },
                {
                    label: 'Offline',
                    data: dashboardData.cameras_by_location.offline,
                    backgroundColor: '#dc3545',
                    stack: 'cameras'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: legendOptions()
            },
            scales: {
                x: {
                    stacked: true,
                    ...axisOptions('Location')
                },
                y: {
                    stacked: true,
                    beginAtZero: true,
                    ...axisOptions('Number of Cameras')
                }
            }
        }
    });
</script>
{% endblock %}
