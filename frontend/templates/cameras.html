{% extends "layout.html" %}
{% block title %}Cameras - VisionGuard{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header d-flex justify-content-between align-items-center">
        Cameras
        <div>
            <!-- Add Camera Button -->
            <button class="btn btn-secondary btn-sm me-1" data-bs-toggle="modal" data-bs-target="#addCameraModal">
                <i class="fa-solid fa-plus me-2"></i>Add Camera
            </button>
        </div>
    </div>
    <div class="card-body p-0">
        <table class="table table-striped mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Location</th>
                    <th>Area</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for cam in cameras %}
                <tr>
                    <td>{{ cam.id }}</td>
                    <td>{{ cam.location }}</td>
                    <td>{{ cam.area }}</td>
                    <td>{{ cam.name }}</td>
                    <td>{{ cam.type }}</td>
                    <td>{{ cam.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Camera Modal -->
<div class="modal fade" id="addCameraModal" tabindex="-1" aria-labelledby="addCameraModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST" action="{{ url_for('add_camera') }}">
        <div class="modal-header">
          <h5 class="modal-title" id="addCameraModalLabel">Add Camera</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input type="text" class="form-control" id="location" name="location" required>
          </div>
          <div class="mb-3">
            <label for="area" class="form-label">Area</label>
            <input type="text" class="form-control" id="area" name="area" required>
          </div>
          <div class="mb-3">
            <label for="name" class="form-label">Camera Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <input type="text" class="form-control" id="type" name="type" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Camera</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
