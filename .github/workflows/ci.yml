name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"   # match our dev environment

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # optional: install dev/test dependencies
        pip install flake8

    - name: Lint code (flake8) # exit zero makes the errors exit with code 0 so pipeline continues
      run: |
        flake8 . --max-line-length=120 --exit-zero 

    # Replaced pytest with unittest for the test framework.
    - name: Run unit tests
      run: |
        python -m unittest discover -s src/visionguard/tests -p "*.py" -t src -v